
services:
  db:
    image: postgres:17
    container_name: sub_db
    env_file: 
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: sub_redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: sub_api
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    env_file: 
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data: